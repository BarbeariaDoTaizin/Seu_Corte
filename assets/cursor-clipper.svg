<svg xmlns="http://www.w3.org/2000/svg" width="32" height="36" viewBox="0 0 32 36">
  <!-- top cap -->
  <rect x="11" y="0" width="10" height="5" rx="2" fill="#2a2a2d" stroke="#050505" stroke-width="1"/>
  <!-- body -->
  <rect x="7" y="3" width="18" height="19" rx="5" fill="#1c1c1e" stroke="#050505" stroke-width="1.2"/>
  <!-- power stripe -->
  <rect x="7" y="12" width="18" height="3" fill="#d3213f"/>
  <!-- small vent dots -->
  <circle cx="12" cy="8" r="1" fill="#3a3a3d"/>
  <circle cx="16" cy="8" r="1" fill="#3a3a3d"/>
  <circle cx="20" cy="8" r="1" fill="#3a3a3d"/>
  <!-- blade plate -->
  <rect x="5" y="21" width="22" height="6" rx="1.4" fill="#d8dadc" stroke="#4a4a4a" stroke-width="1"/>
  <!-- teeth -->
  <g fill="#d8dadc" stroke="#4a4a4a" stroke-width="0.8">
    <polygon points="7,27 9.4,27 8.2,34"/>
    <polygon points="11,27 13.4,27 12.2,34"/>
    <polygon points="15,27 17.4,27 16.2,34"/>
    <polygon points="19,27 21.4,27 20.2,34"/>
    <polygon points="23,27 25.4,27 24.2,34"/>
  </g>
</svg>
