<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- buzz lines -->
  <g stroke="#d3213f" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
    <line x1="27" y1="24" x2="32" y2="21"/>
    <line x1="27" y1="28" x2="33" y2="28"/>
    <line x1="27" y1="32" x2="32" y2="34"/>
  </g>
  <!-- top cap -->
  <rect x="11" y="0" width="10" height="5" rx="2" fill="#2a2a2d" stroke="#050505" stroke-width="1"/>
  <!-- body -->
  <rect x="7" y="3" width="18" height="19" rx="5" fill="#1c1c1e" stroke="#050505" stroke-width="1.2"/>
  <!-- power stripe, brighter = "on" -->
  <rect x="7" y="12" width="18" height="3" fill="#ef2a49"/>
  <!-- vent dots lit -->
  <circle cx="12" cy="8" r="1" fill="#d3213f"/>
  <circle cx="16" cy="8" r="1" fill="#d3213f"/>
  <circle cx="20" cy="8" r="1" fill="#d3213f"/>
  <!-- blade plate -->
  <rect x="5" y="21" width="22" height="6" rx="1.4" fill="#eef0f1" stroke="#4a4a4a" stroke-width="1"/>
  <!-- teeth -->
  <g fill="#eef0f1" stroke="#4a4a4a" stroke-width="0.8">
    <polygon points="7,27 9.4,27 8.2,34"/>
    <polygon points="11,27 13.4,27 12.2,34"/>
    <polygon points="15,27 17.4,27 16.2,34"/>
    <polygon points="19,27 21.4,27 20.2,34"/>
    <polygon points="23,27 25.4,27 24.2,34"/>
  </g>
</svg>
